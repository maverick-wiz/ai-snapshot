name: AI-SNAPSHOT CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: maverick-wiz/ai-snapshot/backend
  PROJECT_KEY: AISNP
  JIRA_BASE: https://wizkidtester.atlassian.net

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1: Backend CI — lint, type-check, tests
  # ─────────────────────────────────────────────
  backend-ci:
    name: "⚡ Backend — Lint & Type Check & Tests"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ai_snapshot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_snapshot_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Ruff lint
        run: ruff check backend/app/
        working-directory: .

      - name: Mypy type check
        run: mypy backend/app/ --ignore-missing-imports
        working-directory: .

      - name: Run pytest with coverage
        run: |
          pytest backend/tests/ --cov=backend/app --cov-report=xml --cov-fail-under=70 -v
        working-directory: .
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

  # ─────────────────────────────────────────────
  # STAGE 2: Frontend CI — lint, test, build
  # ─────────────────────────────────────────────
  frontend-ci:
    name: "🎨 Frontend — ESLint & Vitest & Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: ESLint (zero warnings)
        run: npm run lint
        working-directory: frontend

      - name: Vitest unit tests
        run: npm run test -- --run
        working-directory: frontend

      - name: Vite production build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: /api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ─────────────────────────────────────────────
  # STAGE 3: Build & Push Docker image to GHCR
  # ─────────────────────────────────────────────
  build-push:
    name: "🐳 Build & Push — ghcr.io"
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/static/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────────────
  # STAGE 4: Deploy to AI-SNAPSHOT-KLUSTER
  # ─────────────────────────────────────────────
  deploy-k8s:
    name: "☸️ Deploy → AI-SNAPSHOT-KLUSTER"
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_AI_SNAPSHOT }}" | base64 -d > ~/.kube/config

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s/namespace.yaml --context=AI-SNAPSHOT-KLUSTER
          kubectl apply -f k8s/backend/ -n ai-snapshot --context=AI-SNAPSHOT-KLUSTER
          kubectl apply -f k8s/postgres/ -n ai-snapshot --context=AI-SNAPSHOT-KLUSTER
          kubectl apply -f k8s/ingress.yaml -n ai-snapshot --context=AI-SNAPSHOT-KLUSTER

      - name: Update image tag
        run: |
          kubectl set image deployment/ai-snapshot-backend \
            backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.image_tag }} \
            -n ai-snapshot --context=AI-SNAPSHOT-KLUSTER

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/ai-snapshot-backend \
            -n ai-snapshot --timeout=120s --context=AI-SNAPSHOT-KLUSTER

  # ─────────────────────────────────────────────
  # STAGE 5: Smoke test — all /api/* return 200
  # ─────────────────────────────────────────────
  smoke-test:
    name: "🔥 Smoke Test — /api/* endpoints"
    runs-on: ubuntu-latest
    needs: [deploy-k8s]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Get cluster ingress IP
        run: |
          INGRESS_IP=$(kubectl get ingress ai-snapshot-ingress \
            -n ai-snapshot --context=AI-SNAPSHOT-KLUSTER \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "INGRESS_IP=$INGRESS_IP" >> $GITHUB_ENV

      - name: Smoke test all endpoints
        run: |
          BASE="http://${{ env.INGRESS_IP }}"
          echo "Testing $BASE..."
          curl -sf "$BASE/api/health" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'"
          echo "✅ /api/health"
          curl -sf "$BASE/api/countries" | python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d)==25"
          echo "✅ /api/countries"
          curl -sf "$BASE/api/stocks" | python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d['quotes'])>=6"
          echo "✅ /api/stocks"
          curl -sf "$BASE/api/news?country=US" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'articles' in d"
          echo "✅ /api/news"
          echo "🎉 All smoke tests passed!"
